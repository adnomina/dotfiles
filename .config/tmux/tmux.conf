# Prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# True color support
set-option -sa terminal-overrides ",xterm*:Tc"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Open splits and windows in current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# 1-based indexing
set -g base-index 1
set -g pane-base-index 1

# Status bar - Catppuccin Mocha
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]│ #{?client_prefix,#[fg=#f9e2af]^ ,}"
set -g status-right " #H "
set -g status-right-style "fg=#89b4fa"
set -g status-left-length 30

# Window list
set -g window-status-format "#[fg=#585b70] #I #W "
set -g window-status-current-format "#[fg=#cdd6f4,bold] #I #W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Message/command prompt
set -g message-style "bg=#313244,fg=#cdd6f4"
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
